name: Branch Deployments
# Dagster Cloud (dagster.plus) was retired; the serverless branch-deployment
# jobs were removed and the trigger is manual-only. PR-time testing is handled
# by ci.yml; this workflow keeps only the pytest gate, runnable on demand.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}/branch_deployments
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install uv && uv sync --extra dev
      - name: Run tests
        run: uv run python -m pytest -m unit -q
