name: Build Dashboard

# Rebuild the Panel + Pyodide dashboard on every push to main that touches
# the dashboard module or the dashboard optional-deps extra in pyproject.
#
# The WAGA_PORTFOLIO_REPO_TOKEN secret must be a fine-grained PAT scoped to
# contents:write on the portfolio repo only. Rotate quarterly.
#
# Minimum-privilege posture: this workflow only READS the WAGA repo, so we
# declare permissions: contents: read. The cross-repo push is authorized
# solely via the explicit PAT, not the GITHUB_TOKEN.

on:
  push:
    branches:
      - main
    paths:
      - "src/weather_analytics/dashboard/**"
      - "pyproject.toml"
      - ".github/workflows/build-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-dashboard
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      PORTFOLIO_OWNER: ${{ vars.WAGA_PORTFOLIO_REPO_OWNER || 'cdcoonce' }}
      PORTFOLIO_NAME: ${{ vars.WAGA_PORTFOLIO_REPO_NAME || 'charleslikesdata' }}
      PORTFOLIO_BRANCH: ${{ vars.WAGA_PORTFOLIO_REPO_BRANCH || 'main' }}
      PORTFOLIO_TARGET_DIR: dashboard
    steps:
      - name: Checkout WAGA repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install deps with dashboard extra
        run: uv sync --extra dashboard

      - name: Build Panel app for Pyodide
        run: |
          uv run panel convert \
            src/weather_analytics/dashboard/app.py \
            --to pyodide-worker \
            --out dashboard_build/

      - name: Copy portfolio.css into build output
        run: |
          cp src/weather_analytics/dashboard/static/portfolio.css dashboard_build/portfolio.css

      - name: Smoke-test build artifacts exist
        run: |
          set -euo pipefail
          for f in index.html app.js portfolio.css; do
            if [ ! -f "dashboard_build/$f" ]; then
              echo "Missing expected build artifact: $f"
              exit 1
            fi
          done
          echo "Build artifacts present."

      - name: Push build output to portfolio repo
        env:
          WAGA_PORTFOLIO_REPO_TOKEN: ${{ secrets.WAGA_PORTFOLIO_REPO_TOKEN }}
        run: uv run python scripts/push_dashboard_build.py

      - name: Summarize
        if: always()
        run: |
          echo "### Dashboard build" >> $GITHUB_STEP_SUMMARY
          echo "- Target repo: \`$PORTFOLIO_OWNER/$PORTFOLIO_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "- Target branch: \`$PORTFOLIO_BRANCH\`" >> $GITHUB_STEP_SUMMARY
          echo "- Target dir: \`$PORTFOLIO_TARGET_DIR/\`" >> $GITHUB_STEP_SUMMARY
