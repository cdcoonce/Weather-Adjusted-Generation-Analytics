name: Prod Deployment
# Dagster Cloud (dagster.plus) was retired; hosted deploy jobs removed and the
# trigger is manual-only. Scheduling now runs locally via launchd — see
# docs/local-scheduling.md. This workflow keeps only the pytest gate.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}/deploy
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install uv && uv sync --extra dev
      - name: Run tests
        run: uv run python -m pytest -m unit -q
