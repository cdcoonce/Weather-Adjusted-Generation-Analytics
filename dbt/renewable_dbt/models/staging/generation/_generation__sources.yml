version: 2

sources:
  - name: waga_raw
    description: "Raw generation data ingested via dlt into Snowflake"
    database: "{{ env_var('WAGA_SNOWFLAKE_DATABASE', 'WAGA') }}"
    schema: RAW
    tables:
      - name: generation
        description: "Hourly generation data for renewable energy assets"
        columns:
          - name: timestamp
            description: "Generation timestamp (UTC)"
            tests:
              - not_null

          - name: asset_id
            description: "Unique asset identifier"
            tests:
              - not_null

          - name: gross_generation_mwh
            description: "Gross generation in MWh (before losses)"
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  inclusive: true

          - name: net_generation_mwh
            description: "Net generation in MWh (after losses)"
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  inclusive: true

          - name: curtailment_mwh
            description: "Curtailed energy in MWh"
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  inclusive: true

          - name: availability_pct
            description: "Asset availability percentage"
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  max_value: 100

          - name: asset_capacity_mw
            description: "Asset nameplate capacity in MW"
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  max_value: 1000

        tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns:
                - asset_id
                - timestamp
